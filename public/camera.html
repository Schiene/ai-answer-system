<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI解答システム - カメラ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col overflow-hidden select-none">

  <!-- ルーム参加フォーム -->
  <section id="join-view" class="flex-1 flex flex-col items-center justify-center p-8 gap-5">
    <h1 class="text-xl font-bold">AI 解答システム</h1>
    <p class="text-gray-400 text-sm text-center">表示画面のQRコードをスキャンするか、<br>Room IDを入力して参加してください。</p>
    <input id="room-input" type="text" maxlength="12" placeholder="Room ID"
      class="w-full max-w-xs text-center uppercase tracking-[.3em] text-xl bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 placeholder-gray-600 font-mono">
    <button id="join-btn"
      class="w-full max-w-xs bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white font-bold py-3 rounded-xl transition-all">
      参加する
    </button>
    <p id="join-error" class="text-red-400 text-sm hidden"></p>
  </section>

  <!-- カメラビュー -->
  <section id="camera-view" class="hidden flex-1 flex flex-col">
    <!-- ステータスバー -->
    <div class="shrink-0 flex items-center justify-between px-4 py-2 bg-gray-900 border-b border-gray-800">
      <div class="flex items-center gap-2">
        <span id="cam-dot" class="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
        <span id="cam-status" class="text-sm text-gray-300">準備中…</span>
      </div>
      <span id="room-label" class="text-xs font-mono text-gray-500"></span>
    </div>

    <!-- ビデオ -->
    <div class="relative flex-1 bg-black overflow-hidden">
      <video id="video" class="w-full h-full object-cover" autoplay playsinline muted></video>

      <!-- カウントダウンオーバーレイ -->
      <div class="absolute inset-0 flex items-end justify-center pb-6 pointer-events-none">
        <div class="bg-black/60 rounded-2xl px-6 py-3 flex items-center gap-4">
          <!-- 円形進捗 -->
          <svg class="w-12 h-12 -rotate-90" viewBox="0 0 40 40">
            <circle cx="20" cy="20" r="17" fill="none" stroke="#374151" stroke-width="4"/>
            <circle id="progress-ring" cx="20" cy="20" r="17" fill="none" stroke="#6366f1" stroke-width="4"
              stroke-linecap="round"
              style="stroke-dasharray:107;stroke-dashoffset:107;transition:stroke-dashoffset .2s linear"/>
          </svg>
          <div>
            <p id="countdown-label" class="text-2xl font-bold font-mono text-white">10</p>
            <p id="action-label" class="text-xs text-gray-400">次の解析まで</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 下部サムネイル -->
    <div class="shrink-0 flex items-center gap-3 px-4 py-3 bg-gray-900 border-t border-gray-800">
      <div>
        <p class="text-xs text-gray-500 mb-1">最後の送信</p>
        <img id="last-thumb" src="" alt=""
          class="w-16 h-11 object-cover rounded-lg border border-gray-700 bg-gray-800 hidden">
        <div id="thumb-ph" class="w-16 h-11 rounded-lg border border-gray-700 bg-gray-800 flex items-center justify-center">
          <span class="text-gray-600 text-xs">なし</span>
        </div>
      </div>
      <div class="text-sm text-gray-400" id="last-time-label"></div>
    </div>
  </section>

  <script>
    // ── 設定 ──────────────────────────────────────────────────────────────────
    const CAPTURE_INTERVAL_MS = 10_000;  // 10秒ごとに送信
    const SEND_MAX_SIDE       = 1280;    // 送信画像の最大辺
    const SEND_QUALITY        = 0.75;    // JPEG圧縮品質
    const RING_CIRCUMFERENCE  = 107;     // r=17 の円周 ≈ 2πr

    // ── DOM ───────────────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const joinView   = $('join-view');
    const cameraView = $('camera-view');
    const video      = $('video');
    const progressRing    = $('progress-ring');
    const countdownLabel  = $('countdown-label');
    const actionLabel     = $('action-label');

    // ── 状態 ──────────────────────────────────────────────────────────────────
    let socket       = null;
    let roomId       = null;
    let captureTimer = null;
    let tickTimer    = null;
    let nextSendAt   = 0;
    let processing   = false;

    // URLパラメータで自動参加
    const urlRoom = new URLSearchParams(location.search).get('room');
    if (urlRoom) {
      $('room-input').value = urlRoom.toUpperCase();
      window.addEventListener('load', () => setTimeout(connectSocket, 80));
    }

    $('join-btn').addEventListener('click', connectSocket);
    $('room-input').addEventListener('keydown', e => { if (e.key === 'Enter') connectSocket(); });

    // ── Socket接続 ────────────────────────────────────────────────────────────
    function connectSocket() {
      const id = $('room-input').value.trim().toUpperCase();
      if (!id) { showJoinError('Room IDを入力してください。'); return; }
      roomId = id;
      $('join-error').classList.add('hidden');
      $('join-btn').disabled = true;
      $('join-btn').textContent = '接続中…';

      socket = io({ transports: ['websocket'] });

      socket.on('connect', () => socket.emit('join_room', { roomId }));

      socket.on('join_ack', ({ roomId: id }) => {
        $('room-label').textContent = `Room: ${id}`;
        joinView.classList.add('hidden');
        cameraView.classList.remove('hidden');
        cameraView.classList.add('flex');
        startCamera();
      });

      socket.on('error_occurred', ({ message }) => {
        $('join-btn').disabled = false;
        $('join-btn').textContent = '参加する';
        showJoinError(message);
        socket.disconnect();
        socket = null;
      });

      socket.on('disconnect', () => setCamStatus('dot-red', '切断されました'));
    }

    function showJoinError(msg) {
      $('join-error').textContent = msg;
      $('join-error').classList.remove('hidden');
    }

    // ── カメラ起動 ────────────────────────────────────────────────────────────
    async function startCamera() {
      setCamStatus('dot-yellow', 'カメラ起動中…');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false,
        });
        video.srcObject = stream;
        await new Promise(r => (video.onloadedmetadata = r));
        setCamStatus('dot-green', '撮影中');
        startCaptureLoop();
      } catch (err) {
        setCamStatus('dot-red', 'カメラエラー');
        actionLabel.textContent = err.message;
        countdownLabel.textContent = '—';
      }
    }

    // ── 10秒キャプチャループ ──────────────────────────────────────────────────
    function startCaptureLoop() {
      scheduleNext();
    }

    function scheduleNext() {
      nextSendAt = Date.now() + CAPTURE_INTERVAL_MS;
      processing = false;
      actionLabel.textContent = '次の解析まで';
      setCamStatus('dot-green', '撮影中');

      // カウントダウン表示
      clearInterval(tickTimer);
      tickTimer = setInterval(() => {
        const remaining = Math.max(0, nextSendAt - Date.now());
        const secs = Math.ceil(remaining / 1000);
        countdownLabel.textContent = secs;
        const progress = 1 - remaining / CAPTURE_INTERVAL_MS;
        progressRing.style.strokeDashoffset = String(RING_CIRCUMFERENCE * (1 - progress));
        if (remaining <= 0) {
          clearInterval(tickTimer);
          captureAndSend();
        }
      }, 100);
    }

    function captureAndSend() {
      if (video.readyState < 2 || !socket || !roomId) {
        scheduleNext();
        return;
      }

      processing = true;
      setCamStatus('dot-indigo', 'AI 解析中…');
      actionLabel.textContent = '解析中…';
      countdownLabel.textContent = '…';

      // 送信用キャンバス生成
      const sw = video.videoWidth;
      const sh = video.videoHeight;
      const scale = Math.min(1, SEND_MAX_SIDE / Math.max(sw, sh));
      const tw = Math.round(sw * scale);
      const th = Math.round(sh * scale);
      const canvas = document.createElement('canvas');
      canvas.width = tw;
      canvas.height = th;
      canvas.getContext('2d').drawImage(video, 0, 0, tw, th);
      const imageData = canvas.toDataURL('image/jpeg', SEND_QUALITY);

      // サムネイル更新
      const thumb = $('last-thumb');
      thumb.src = imageData;
      thumb.classList.remove('hidden');
      $('thumb-ph').classList.add('hidden');
      $('last-time-label').textContent = `${new Date().getHours()}:${String(new Date().getMinutes()).padStart(2,'0')} 送信`;

      socket.emit('image_captured', { roomId, imageData }, (ack) => {
        // ACK受信後、次のサイクルへ（エラーでも継続）
        scheduleNext();
      });
    }

    // ── ステータス ────────────────────────────────────────────────────────────
    const DOT_COLORS = {
      'dot-yellow': 'bg-yellow-400',
      'dot-green':  'bg-emerald-400',
      'dot-red':    'bg-red-400',
      'dot-indigo': 'bg-indigo-400',
    };
    function setCamStatus(dot, text) {
      $('cam-dot').className = `w-2.5 h-2.5 rounded-full ${DOT_COLORS[dot] || 'bg-gray-500'}`;
      $('cam-status').textContent = text;
    }
  </script>
</body>
</html>
