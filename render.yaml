services:
  - type: web
    name: ai-answer-system
    env: node
    region: oregon
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # Render ダッシュボードで手動設定
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ROOM_ID_LENGTH
        value: "10"
      - key: ROOM_EXPIRY_MINUTES
        value: "60"
      - key: RATE_LIMIT_SECONDS
        value: "20"
